<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#3AB46F" opacity="0.1"/>
  
  <!-- Bunny Body -->
  <ellipse cx="100" cy="120" rx="40" ry="50" fill="#FFE5E5"/>
  
  <!-- Bunny Head -->
  <circle cx="100" cy="70" r="35" fill="#FFE5E5"/>
  
  <!-- Left Ear -->
  <ellipse cx="75" cy="35" rx="15" ry="40" fill="#FFE5E5" transform="rotate(-20 75 35)"/>
  <ellipse cx="75" cy="35" rx="8" ry="30" fill="#FDB1B1" transform="rotate(-20 75 35)"/>
  
  <!-- Right Ear -->
  <ellipse cx="125" cy="35" rx="15" ry="40" fill="#FFE5E5" transform="rotate(20 125 35)"/>
  <ellipse cx="125" cy="35" rx="8" ry="30" fill="#FDB1B1" transform="rotate(20 125 35)"/>
  
  <!-- Left Eye -->
  <circle cx="85" cy="65" r="5" fill="#333"/>
  <circle cx="86" cy="64" r="2" fill="white"/>
  
  <!-- Right Eye -->
  <circle cx="115" cy="65" r="5" fill="#333"/>
  <circle cx="116" cy="64" r="2" fill="white"/>
  
  <!-- Nose -->
  <circle cx="100" cy="80" r="4" fill="#FDB1B1"/>
  
  <!-- Mouth -->
  <path d="M 100 80 Q 95 85 90 84" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 100 80 Q 105 85 110 84" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Paws -->
  <ellipse cx="75" cy="160" rx="12" ry="18" fill="#FFE5E5"/>
  <ellipse cx="125" cy="160" rx="12" ry="18" fill="#FFE5E5"/>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="120" r="8" fill="#FCB045" opacity="0.3"/>
  <circle cx="140" cy="130" r="8" fill="#FD1D1D" opacity="0.3"/>
</svg>
