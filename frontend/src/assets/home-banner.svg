<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="homeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3AB46F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCB045;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#f8f9fa"/>
  
  <!-- House/Home Icon -->
  <g transform="translate(150, 150)">
    <!-- Roof -->
    <polygon points="0,-80 -60,-20 60,-20" fill="url(#homeGrad)"/>
    
    <!-- House Body -->
    <rect x="-60" y="-20" width="120" height="100" rx="5" fill="#FFE5E5" stroke="url(#homeGrad)" stroke-width="2"/>
    
    <!-- Door -->
    <rect x="-20" y="20" width="40" height="60" rx="3" fill="#3AB46F"/>
    <circle cx="15" cy="50" r="3" fill="#FCB045"/>
    
    <!-- Window 1 -->
    <rect x="-45" y="0" width="25" height="25" rx="2" fill="#3AB46F" opacity="0.7"/>
    <line x1="-45" y1="12.5" x2="-20" y2="12.5" stroke="#FFE5E5" stroke-width="1"/>
    <line x1="-32.5" y1="0" x2="-32.5" y2="25" stroke="#FFE5E5" stroke-width="1"/>
    
    <!-- Window 2 -->
    <rect x="20" y="0" width="25" height="25" rx="2" fill="#3AB46F" opacity="0.7"/>
    <line x1="20" y1="12.5" x2="45" y2="12.5" stroke="#FFE5E5" stroke-width="1"/>
    <line x1="32.5" y1="0" x2="32.5" y2="25" stroke="#FFE5E5" stroke-width="1"/>
    
    <!-- Chimney -->
    <rect x="50" y="-60" width="15" height="50" fill="#FD1D1D"/>
    <rect x="48" y="-62" width="19" height="4" fill="#FD1D1D"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="50" r="8" fill="#FD1D1D" opacity="0.2"/>
  <circle cx="260" cy="100" r="10" fill="#3AB46F" opacity="0.2"/>
  <circle cx="80" cy="250" r="7" fill="#FCB045" opacity="0.2"/>
</svg>
