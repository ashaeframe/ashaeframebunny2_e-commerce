<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="productGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AB46F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FCB045;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FD1D1D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#f8f9fa"/>
  
  <!-- Product Box -->
  <rect x="50" y="50" width="200" height="200" rx="15" fill="url(#productGrad)" opacity="0.1" stroke="url(#productGrad)" stroke-width="2"/>
  
  <!-- Shopping Bag Icon -->
  <g transform="translate(150, 130)">
    <!-- Bag Handle -->
    <path d="M -30 -20 Q -30 -50 0 -50 Q 30 -50 30 -20" stroke="#3AB46F" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Bag -->
    <rect x="-35" y="-20" width="70" height="60" rx="5" fill="url(#productGrad)"/>
    
    <!-- Bag Details -->
    <line x1="-35" y1="0" x2="35" y2="0" stroke="white" stroke-width="2" opacity="0.5"/>
    
    <!-- Items in Bag -->
    <circle cx="-15" cy="15" r="6" fill="white" opacity="0.7"/>
    <circle cx="0" cy="15" r="6" fill="white" opacity="0.7"/>
    <circle cx="15" cy="15" r="6" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Decorative Stars -->
  <circle cx="50" cy="60" r="5" fill="#FCB045"/>
  <circle cx="250" cy="80" r="5" fill="#3AB46F"/>
  <circle cx="60" cy="240" r="5" fill="#FD1D1D"/>
  <circle cx="240" cy="260" r="5" fill="#FCB045"/>
</svg>
